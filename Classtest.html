<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="11">
        <caption>Weekly time table</caption>
        <thead>
        <tr>
            <th>Time/day</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
        </tr>
        </thead>
        <tbody>
            <tr>
                <td>8:00-9:00</td>
                <td rowspan="2">English</td>
                <td>Maths</td>
                <td>Science</td>
            </tr>
            <tr>
                <td>9:00-10:00</td>
                <!-- <td>English</td> -->
                <td>Physics</td>
                <td>Chemistry</td>
            </tr>
            <tr>
                <td>10:00-10:30</td>
                <td colspan="3" align="right">Break</td>
                <!-- <td>physics</td> -->
                <!-- <td>commerce</td> -->
            </tr>
            <tr>
                <td>10:30-11:30</td>
                <td>Geography</td>
                <td>Civic Education</td>
                <td>Economics</td>
            </tr>
</tbody>
    </table>
    
</body>
</html>
