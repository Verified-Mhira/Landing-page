<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div>
<label><b>Travel reservation form</b></label></br>
<p><b>*denotes mandatory</b></p><br>
<label><b>Full name*:</b></label><br/>
<input type="text" name="fullname" id="fullname" placeholder="FirstName LastName" required/><br/>
</div> 
<div>
<label><b>Email address*:</b></label><br/>
<input type="email" name="email" id="email" placeholder="EMAIL ADDRESS" required/><br>
</div>
<div>
<label><b>Select Tour Package*:</b></label><br>
<select>
<option value="Niger"><strong>Niger</strong></option>
<option value="Goa"><strong>Goa</strong></option>
</select>
</div>
<div>
<label>Arrival date*:</label><br/>
<input type="date" name="dob" required/>
</div>  
<div>
<label><b>Number of persons*:</b></label><br>
<input type="persons" placeholder="UNKNOWN_TYPE" required/>
</div>
<div>
<label><b>What would you want to avail?*</b></label><br>
</div>
<div>
<label><b>Bording</b></label>
<input type="checkbox"/><br>
<label><b>Fooding</b></label>
<input type="checkbox"/><br>
<label><b>Sight seeing</b></label>
<input type="checkbox"/>
</div>
<div>
<label><b>Discount Coupon code:</b></label></br>
<input type="code" placeholder="UNKNOWN_TYPE" required/>
</div>
<div>
<label><b>Terms and conditions</b></label><br/>
<label><b>I agree</b></label>
<input name="Terms" type="radio" required/>
<label><b>I disagree</b></label>
<input name="Terms" type="radio" required/>
</div>
<div>
<button type="complete reservation"><b>Complete reservation</b></button>
</div>
</body>
</html>
