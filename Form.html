<!-- A form is used to collect data from the user -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Form></Form></title>
 </head>
 <body>
<form>
<div>
<label>Full name</label><br>
<input type="text" name="fullname" id="fullname" placeholder="enter your fullname" required/><br/>
<label>forms require that you use label instead of paragraph</label><br/>
<label>div is the container</label>
</div>
<div>
<label>email</label><br/>
<input type="email" name="email" id="email" placeholder="enter your email address" required/>
</div>
<div>
<label>password</label><br>
<input type="password" name="password" id="password" placeholder="enter your password" required/>
</div>
<div>
<p>Gender:</p>
<label>Male</label>
<input type="radio" name="gender"/>
<label>Female</label>
<input type="radio" name="gender"/>
</div>
<div>
<label>Select your course</label>
<select>
<option value="javascript">Javascript</option>
<option value="ui/ux">ui/ux</option>
<option value="CAD">CAD</option>
<option value="AI machine language">AI machine Language</option>
<option value="cyber security">cyber security</option>
<option value="python">python</option>
<option value="3D">3D</option>
</select>
</div>
<div>
<label>Select your file</label><br/>
<input type="file"/>
</div>
<div>
<label> leave a message</label><br>
<textarea rows="5" cols="20"></textarea>
</div>
<div>
<label>Date of Birth</label><br/>
<input type="date" name="DOB"/>
</div>
<div>
<label>Remember me</label>
<input type="checkbox"/>
</div>
<div>
<button type="submit">submit</button>
</div>
</form> 
 </body>
 </html>
